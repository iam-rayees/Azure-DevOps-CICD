trigger:
  branches:
    include:
      - development
      - uat
      - production
    exclude: ["master", "feature*", "README.md"]
pool:
  name: AzureAgentPool
  demands:
    - Java -equals Yes
    - Terraform -equals Yes
    - Agent.Name -equals ProdADO
variables:
  global_version: "1.0.0"
  global_email: "rayees.mohd@gmail.com"
  # azure_dev_sub: "1e9d13b0-73fc-43eb-b04e-4b4f5a5ea96f"
  isDev: $[eq(variables['Build.SourceBranch'], 'refs/heads/development')]
  isProd: $[eq(variables['Build.SourceBranch'], 'refs/heads/production')]

stages:
  - stage: CheckingADOAgentStatus
    condition: or(eq(variables.isProd, true), eq(variables.isDev, true))
    pool:
      name: AzureAgentPool
      demands:
        - Terraform -equals Yes
    variables:
      stage_version: "2.0.0"
      stage_email: "rayees.mohd@gmail.com"
    jobs:
      - job: CheckingTerraformAndPackerAndAnsibleAndTrivy
        variables:
          job_version: "3.0.0"
          job_email: "rayaws@gmail.com"
        timeoutInMinutes: "5"
        steps:
          - script: echo $(Build.BuildId)
            displayName: "Display The Build-ID"
          - script: ansible --version && packer version && terraform version && trivy --version
            displayName: "Display Terraform & Packer, Ansible and Trivy Version"
          - script: docker version && docker ps && docker images && docker ps -a
            displayName: "Display Docker Version"
          - script: pwd && ls -al
            displayName: "List Folder & Files"
